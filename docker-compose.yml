services:
  postgres:
    image: postgres:16
    container_name: stockresearch-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: KitaSelaluBersama
      POSTGRES_DB: stockresearch
    ports:
      - "65432:5432"
    volumes:
      - stockresearch:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: stockresearch-redis
    ports:
      - "6379:6379"

volumes:
  stockresearch:
